# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Root Python dependencies (our own requirements)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    # Ignore vendored backend directories - these are third-party code
    # committed as-is. Updating them risks breaking the training pipeline.
    # See: https://github.com/Ktiseos-Nyx/Ktiseos-Nyx-Trainer/issues/195
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # Explicitly DO NOT scan vendored directories:
  # - trainer/derrian_backend/lycoris/
  # - trainer/derrian_backend/sd_scripts/
  # These contain vendored Kohya SS and LyCORIS code with pinned deps.
  # Dependabot alerts on these are noise for a local training tool.
