# Dependabot configuration
version: 2
updates:
  # Frontend npm dependencies (WITH React grouping)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    groups:
      react-core:
        patterns:
          - "react"
          - "react-dom"

  # Root Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
  
  # Vendored directories — disabled via ignore-all
  - package-ecosystem: "pip"
    directory: "/trainer/derrian_backend/lycoris"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"

  - package-ecosystem: "pip"
    directory: "/trainer/derrian_backend/sd_scripts"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"